name = "macrolens-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding    = "MMF_KV"
id         = "66c313c710a04a4eb04775b80a44f313"
preview_id = "66c313c710a04a4eb04775b80a44f313"

[triggers]
crons = [
  "0 1 * * *",       # 매일 새벽 — 일반 데이터 갱신
  "0 15 * * 3",      # 매주 수요일 10시 ET (=15 UTC) — QRA 감지
  "*/30 * * * *",    # 30분마다 — 뉴스 RSS 갱신 + 자동 번역
  "30 22 * * 1-5",   # 평일 UTC 22:30 (미장 마감 ~30분 후) — 장마감 리포트
  "0 13 * * 1-5",    # 평일 UTC 13:00 (미장 시작 1.5h 전) — 장시작 리포트
]

[ai]
binding = "AI"
