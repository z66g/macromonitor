name = "macrolens-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding    = "MMF_KV"
id         = "66c313c710a04a4eb04775b80a44f313"
preview_id = "66c313c710a04a4eb04775b80a44f313"

[triggers]
crons = [
  # ★ cron-job.org 트리거(00분/30분)와 충돌 방지 위해 5분 오프셋 적용
  "15 1,7,13,19 * * *", # 6시간마다 — 일반 데이터 갱신 (UTC 1·7·13·19시 15분)
                         # NFP/CPI/JOLTS 등 발표 직후 빠르게 반영
  "5,35 * * * *",       # 매 시간 5분/35분 — 뉴스 RSS 수집
                         # cron-job.org가 00분/30분에 GH Actions 트리거하므로 5분 어긋나게
]

[ai]
binding = "AI"
