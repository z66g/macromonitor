name: Backfill Auction Summaries

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Backfill
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "" | base64 -d > /tmp/backfill.py
          python3 /tmp/backfill.py

      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/auction_results.json
          git diff --staged --quiet || git commit -m "chore: backfill auction summaries [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
