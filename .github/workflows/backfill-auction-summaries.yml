name: Backfill Auction Summaries

on:
  workflow_dispatch:
    inputs:
      start:
        description: '시작 인덱스 (0부터)'
        default: '0'
      end:
        description: '종료 인덱스 (미입력시 전체)'
        default: '8'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Backfill
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          START: ${{ inputs.start }}
          END: ${{ inputs.end }}
        run: |
          echo "" | base64 -d > /tmp/backfill.py
          python3 /tmp/backfill.py

      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/auction_results.json
          git diff --staged --quiet || git commit -m "chore: backfill auction summaries [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
