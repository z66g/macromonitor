name: Debug Gemini Key

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check Gemini API Key
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "" | base64 -d > /tmp/check.py
          python3 /tmp/check.py
