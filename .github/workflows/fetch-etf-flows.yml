name: Fetch BTC ETF Flows

on:
  schedule:
    - cron: '0 2 * * *'   # 매일 UTC 02:00 (미장 마감 후)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch BTC ETF Flow Data
        run: |
          mkdir -p data
          python3 << 'PYEOF'
          import urllib.request, json, re
          from datetime import datetime, timezone

          results = []

          # ══════════════════════════════════════════════════════
          # PRIMARY: Farside Investors
          # https://farside.co.uk/bitcoin-etf-flow-all-data/
          # 업계 표준 BTC ETF 플로우 레퍼런스 (단위: 백만 USD)
          # ══════════════════════════════════════════════════════
          try:
              url = 'https://farside.co.uk/bitcoin-etf-flow-all-data/'
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.9',
                  'Cache-Control': 'no-cache',
              })
              with urllib.request.urlopen(req, timeout=25) as r:
                  html = r.read().decode('utf-8', errors='replace')

              # ── 테이블 전체 추출 ──────────────────────────
              table_match = re.search(r'<table[^>]*>(.*?)</table>', html, re.DOTALL | re.IGNORECASE)
              if not table_match:
                  raise ValueError('HTML 테이블 미발견')

              table_html = table_match.group(1)
              rows = re.findall(r'<tr[^>]*>(.*?)</tr>', table_html, re.DOTALL | re.IGNORECASE)

              temp = []
              for row in rows:
                  cells = re.findall(r'<t[dh][^>]*>(.*?)</t[dh]>', row, re.DOTALL | re.IGNORECASE)
                  if len(cells) < 3:
                      continue

                  # HTML 태그 및 특수문자 제거
                  clean = [re.sub(r'<[^>]+>', '', c).replace('&nbsp;', '').replace('\xa0', '').strip()
                           for c in cells]

                  # 첫 번째 셀: 날짜 (다양한 포맷 대응)
                  date_raw = clean[0]
                  date_iso = None
                  for fmt in ('%m/%d/%Y', '%d/%m/%Y', '%Y-%m-%d'):
                      try:
                          date_iso = datetime.strptime(date_raw, fmt).strftime('%Y-%m-%d')
                          break
                      except Exception:
                          pass
                  if not date_iso:
                      continue

                  # 마지막 셀: Total (백만 USD)
                  # 음수 표기: (123) → -123
                  total_raw = clean[-1].replace(',', '').replace(' ', '')
                  neg_m = re.match(r'^\(([0-9.]+)\)$', total_raw)
                  if neg_m:
                      total_m = -float(neg_m.group(1))
                  else:
                      try:
                          val = float(total_raw)
                          # 20B(20000M) 초과는 파싱 오류로 간주
                          total_m = val if abs(val) < 20000 else None
                      except Exception:
                          total_m = None

                  if total_m is None:
                      continue

                  # M → B 변환, 60일치만 수집
                  temp.append({'date': date_iso, 'netFlow': round(total_m / 1000, 4)})

              if not temp:
                  raise ValueError('파싱된 행 없음')

              # 날짜 오름차순 → 누적 계산 → 내림차순(최신 먼저)
              temp.sort(key=lambda x: x['date'])
              cum = 0.0
              for item in temp:
                  cum += item['netFlow']
                  item['cumFlow'] = round(cum, 4)
              temp.reverse()

              results = temp[:60]
              print(f'Farside 성공: {len(results)}일치 / 최신={results[0]}')
              source = 'farside'

          except Exception as e:
              print(f'Farside 실패: {e}')
              source = 'fallback'

          # ══════════════════════════════════════════════════════
          # FALLBACK 1: CoinGlass 대체 엔드포인트
          # ══════════════════════════════════════════════════════
          if not results:
              cg_urls = [
                  'https://coinglassapi.com/api/v1/bitcoin/etf-flow',
                  'https://api.coinglass.com/api/public/v2/indicator/bitcoin-etf-flow',
              ]
              for cg_url in cg_urls:
                  try:
                      req = urllib.request.Request(cg_url, headers={
                          'User-Agent': 'Mozilla/5.0',
                          'Accept': 'application/json',
                      })
                      with urllib.request.urlopen(req, timeout=15) as r:
                          data = json.loads(r.read().decode())
                      flows = data.get('data', [])
                      if not flows:
                          continue
                      cum = 0.0
                      temp = []
                      for item in reversed(flows[:60]):
                          net_b = float(item.get('netFlow', item.get('total', 0)) or 0) / 1e6
                          cum += net_b
                          temp.insert(0, {
                              'date':    (item.get('date', item.get('time', ''))[:10]),
                              'netFlow': round(net_b, 4),
                              'cumFlow': round(cum, 4),
                          })
                      if temp:
                          results = temp
                          source = 'coinglass'
                          print(f'CoinGlass 성공: {len(results)}일치')
                          break
                  except Exception as ce:
                      print(f'CoinGlass 시도 실패 ({cg_url}): {ce}')

          # ══════════════════════════════════════════════════════
          # FALLBACK 2: 기존 데이터 유지
          # ══════════════════════════════════════════════════════
          if not results:
              try:
                  with open('data/etf_flows.json') as f:
                      existing = json.load(f)
                  results = existing.get('dailyFlows', [])
                  source = 'preserved'
                  print(f'기존 데이터 유지: {len(results)}일치')
              except Exception:
                  results = []
                  source = 'empty'

          # ── 최종 저장 ─────────────────────────────────────
          cum_total = results[0]['cumFlow'] if results else 0
          output = {
              'updated':    datetime.now(timezone.utc).isoformat(),
              'source':     source,
              'cumTotal':   round(cum_total, 3),
              'dailyFlows': results,
          }
          with open('data/etf_flows.json', 'w') as f:
              json.dump(output, f, indent=2)
          print(f'완료: {len(results)}일치 / 누적 ${cum_total:.2f}B / 소스={source}')
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_flows.json
          git diff --staged --quiet || git commit -m "chore: update BTC ETF flows [$(date -u '+%Y-%m-%d')]"
          git push
