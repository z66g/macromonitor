name: H.4.1 Weekly Liquidity Telegram

on:
  schedule:
    # 매주 목요일 22:00 UTC (금요일 07:00 KST) — Fed H.4.1 릴리즈(~21:30 UTC) 직후
    - cron: '0 22 * * 4'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch H.4.1 data & Send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKER_URL: https://macrolens-worker.macrolens.workers.dev
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, datetime

          BOT_TOKEN  = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          CHAT_ID    = os.environ.get("TELEGRAM_CHAT_ID", "")
          WORKER_URL = os.environ.get("WORKER_URL", "")

          if not BOT_TOKEN or not CHAT_ID:
              print("Telegram secrets 없음, 스킵")
              exit(0)

          # ── /h41-history?weeks=2 호출 ──
          print("H.4.1 히스토리 요청 중...")
          try:
              req = urllib.request.Request(
                  f"{WORKER_URL}/h41-history?weeks=2",
                  headers={"User-Agent": "MacroMonitor-Actions/1.0"}
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read())
          except Exception as e:
              print(f"Worker 호출 실패: {e}")
              exit(1)

          raw = data.get("raw", [])
          if len(raw) < 1:
              print("데이터 없음, 스킵")
              exit(0)

          # raw 단위: 백만달러(M)
          cur  = raw[0]
          prev = raw[1] if len(raw) >= 2 else {}

          def M(key, d):
              v = d.get(key)
              return float(v) if v is not None else None

          def delta(key):
              c, p = M(key, cur), M(key, prev)
              return (c - p) if c is not None and p is not None else None

          # ── 핵심 지표 (백만달러) ──
          rc   = M("reserve_credit",   cur)   # 연준 총자산
          tga  = M("tga",              cur)   # TGA
          rrp  = M("on_rrp_domestic",  cur)   # ON RRP (domestic only)
          res  = M("reserve_balances", cur)   # 은행 준비금

          # 순유동성 = 연준총자산 - TGA - ON RRP(domestic)
          nl   = (rc - tga - rrp) if rc is not None and tga is not None and rrp is not None else None

          # 전주 순유동성
          rc_p  = M("reserve_credit",  prev)
          tga_p = M("tga",             prev)
          rrp_p = M("on_rrp_domestic", prev)
          nl_p  = (rc_p - tga_p - rrp_p) if all(v is not None for v in [rc_p, tga_p, rrp_p]) else None

          nl_d  = (nl - nl_p)  if nl  is not None and nl_p  is not None else None
          rc_d  = delta("reserve_credit")
          tga_d = delta("tga")
          rrp_d = delta("on_rrp_domestic")
          res_d = delta("reserve_balances")

          # ── 포맷 함수 ──
          def fmt_T(v_M):
              return f"${v_M/1e6:.2f}T" if v_M is not None else "N/A"

          def fmt_B(v_M):
              return f"${v_M/1e3:.1f}B" if v_M is not None else "N/A"

          def d_str(d_M):
              if d_M is None: return ""
              b     = d_M / 1e3
              sign  = "+" if b >= 0 else ""
              emoji = "🟢" if b >= 0 else "🔴"
              if abs(b) >= 100:
                  return f"  Δ{sign}{b/1e3:.2f}T {emoji}"
              return f"  Δ{sign}{b:.1f}B {emoji}"

          # ── 방향성 판단 ──
          if nl_d is not None:
              nl_dB = nl_d / 1e3
              if   nl_dB >  50: direction = "→ 유동성 순증 — 위험자산 우호 환경 🟢"
              elif nl_dB < -50: direction = "→ 유동성 순감 — 단기 헤드윈드 주의 🔴"
              else:             direction = "→ 유동성 소폭 변화 — 방향성 중립 ⚪"
          else:
              direction = None

          release_date = cur.get("releaseDate", datetime.date.today().isoformat())

          # ── 메시지 조립 ──
          lines = [
              f"📊 <b>Fed H.4.1 주간 유동성</b> | {release_date}",
              "─" * 24,
              f"• 연준총자산: {fmt_T(rc)}{d_str(rc_d)}",
              f"• 준비금:    {fmt_T(res)}{d_str(res_d)}",
              f"• TGA:       {fmt_B(tga)}{d_str(tga_d)}",
              f"• ON RRP:    {fmt_B(rrp)}{d_str(rrp_d)}",
              f"• 순유동성:  {fmt_T(nl)}{d_str(nl_d)}",
              "",
          ]
          if direction:
              lines += [direction, ""]
          lines.append("🔗 macromonitor.zbbg.kr")

          text = "\n".join(lines)
          print("메시지 미리보기:")
          print(text)

          # ── Telegram 발송 ──
          url     = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
          payload = json.dumps({
              "chat_id": CHAT_ID,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
          }).encode("utf-8")
          req = urllib.request.Request(url, data=payload,
                                       headers={"Content-Type": "application/json"})
          with urllib.request.urlopen(req, timeout=15) as resp:
              result = json.loads(resp.read())
              if result.get("ok"):
                  print("✅ H.4.1 Telegram 발송 완료")
              else:
                  print(f"❌ Telegram 오류: {result}")
                  exit(1)
          PYEOF
