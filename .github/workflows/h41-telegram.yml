name: H.4.1 Weekly Liquidity Telegram

on:
  # 외부 크론 서비스(cron-job.org)에서 repository_dispatch로 트리거
  repository_dispatch:
    types: [h41-weekly]
  # 백업: GitHub Actions 내장 크론
  schedule:
    - cron: '13 22 * * 4'   # UTC 22:13 목 (KST 07:13 금)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch data & Send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKER_URL: https://macrolens-worker.macrolens.workers.dev
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import json, os, requests, datetime

          BOT_TOKEN  = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          CHAT_ID    = os.environ.get("TELEGRAM_CHAT_ID", "")
          WORKER     = os.environ.get("WORKER_URL", "")
          HEADERS    = {"User-Agent": "MacroMonitor-Actions/1.0"}

          if not BOT_TOKEN or not CHAT_ID:
              print("Telegram secrets 없음, 스킵")
              exit(0)

          # ── 3개 엔드포인트 병렬-ish 호출 ──
          def fetch_json(path, timeout=30):
              try:
                  r = requests.get(f"{WORKER}{path}", headers=HEADERS, timeout=timeout)
                  r.raise_for_status()
                  return r.json()
              except Exception as e:
                  print(f"  {path} 실패: {e}")
                  return None

          print("데이터 수집 중...")
          h41   = fetch_json("/h41-history?weeks=4")  # 여분 포함: 파싱 실패분 제외 후 최소 2주치 확보
          liq   = fetch_json("/liq?force=1", 45)
          tower = fetch_json("/liq-tower", 45)
          ici   = fetch_json("/ici", 15)

          if not h41:
              print("H.4.1 데이터 없음, 종료")
              exit(1)

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 1. H.4.1 대차대조표 (raw: 백만달러)
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # raw에는 파싱 실패 항목도 포함됨 → reserve_balances 있는 valid 항목만
          raw_all = h41.get("raw", [])
          raw = [r for r in raw_all if r and r.get("reserve_balances") is not None]
          print(f"H.4.1 raw 전체 {len(raw_all)}건 → valid {len(raw)}건")
          cur  = raw[0] if len(raw) >= 1 else {}
          prev = raw[1] if len(raw) >= 2 else {}

          def M(key, d):
              v = d.get(key)
              return float(v) if v is not None else None

          def delta(key):
              c, p = M(key, cur), M(key, prev)
              return (c - p) if c is not None and p is not None else None

          rc   = M("reserve_credit",   cur)
          tga  = M("tga",              cur)
          rrp  = M("on_rrp_domestic",  cur)
          res  = M("reserve_balances", cur)

          nl   = (rc - tga - rrp) if all(v is not None for v in [rc, tga, rrp]) else None
          rc_p, tga_p, rrp_p = M("reserve_credit", prev), M("tga", prev), M("on_rrp_domestic", prev)
          nl_p = (rc_p - tga_p - rrp_p) if all(v is not None for v in [rc_p, tga_p, rrp_p]) else None

          nl_d  = (nl - nl_p) if nl is not None and nl_p is not None else None
          rc_d  = delta("reserve_credit")
          tga_d = delta("tga")
          rrp_d = delta("on_rrp_domestic")
          res_d = delta("reserve_balances")

          def fmt_T(v_M):
              return f"${v_M/1e6:.2f}T" if v_M is not None else "N/A"

          def fmt_B(v_M):
              return f"${v_M/1e3:.1f}B" if v_M is not None else "N/A"

          def d_str(d_M):
              if d_M is None: return ""
              b = d_M / 1e3
              sign = "+" if b >= 0 else ""
              emoji = "🟢" if b >= 0 else "🔴"
              if abs(b) >= 100:
                  return f"  Δ{sign}{b/1e3:.2f}T {emoji}"
              return f"  Δ{sign}{b:.1f}B {emoji}"

          release_date = cur.get("releaseDate", datetime.date.today().isoformat())

          lines = [
              f"📊 <b>Fed H.4.1 주간 유동성 리포트</b> | {release_date}",
              "",
              "━━━ 연준 대차대조표 ━━━",
              f"• 연준총자산: {fmt_T(rc)}{d_str(rc_d)}",
              f"• 준비금:    {fmt_T(res)}{d_str(res_d)}",
              f"• TGA:       {fmt_B(tga)}{d_str(tga_d)}",
              f"• ON RRP:    {fmt_B(rrp)}{d_str(rrp_d)}",
              f"• 순유동성:  {fmt_T(nl)}{d_str(nl_d)}",
          ]

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 2. NL 모멘텀 & 드레인 전망 (/liq + /liq-tower)
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          nlm = liq.get("nlMomentum", {}) if liq else {}
          nl_score = nlm.get("score")
          nl_regime = nlm.get("regime")
          nl_cur_b = nlm.get("currentNL")
          nl_avg_b = nlm.get("avg4wNL")

          regime_emoji = {"risk_on": "🟢", "risk_off": "🔴"}.get(nl_regime, "⚪")

          lines += ["", "━━━ NL 모멘텀 & 드레인 전망 ━━━"]
          if nl_score is not None:
              lines.append(f"• NL Score: {nl_score:+.2f} ({nl_regime} {regime_emoji})")
          if nl_avg_b is not None and nl_cur_b is not None:
              lines.append(f"• 4주 평균: ${nl_avg_b/1000:.2f}T → 현재 ${nl_cur_b/1000:.2f}T")

          # Vampire drain 4주 전망
          vampire = tower.get("vampire", {}) if tower else {}
          weeks = vampire.get("weeks", [])
          if weeks:
              lines.append("")
              lines.append("드레인 4주 전망:")
              for w in weeks:
                  bd = w.get("breakdown", {})
                  nd = w.get("netDrain", 0)
                  warn = " 🚨" if nd > 50 else " ⚠️" if nd > 30 else ""
                  lines.append(
                      f"  {w['label']}: {nd:+.0f}B"
                      f" (쿠폰{bd.get('couponDrain',0):+.0f}"
                      f"|Bill{bd.get('billAbsorb',0):+.0f}"
                      f"|QT{bd.get('qtDrain',0):+.0f}){warn}"
                  )

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 3. MMF 자본 이동 & 유동성 질
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          bd  = liq.get("bankDeposits", {}) if liq else {}
          rr  = liq.get("repoRegime", {}) if liq else {}

          # ICI 기준 MMF 데이터 (프론트엔드와 동일 소스)
          ici_data    = ici or {}
          ici_total   = ici_data.get("total")       # 조 단위 (예: 7.82)
          ici_retail  = ici_data.get("retail")
          ici_inst    = ici_data.get("institutional")
          ici_change  = ici_data.get("changeB")      # WoW $B
          ici_hist    = ici_data.get("history", [])
          ici_kv_cnt  = ici_data.get("kvCount", 0)

          bd_cur    = bd.get("current")
          bd_delta  = bd.get("delta")

          lines += ["", "━━━ MMF 자본 이동 & 유동성 질 ━━━"]
          if ici_total is not None:
              d = f"  WoW {ici_change:+.1f}B" if ici_change is not None else ""
              lines.append(f"• MMF 총잔고: ${ici_total:.2f}T{d}")
              if ici_retail is not None and ici_inst is not None:
                  lines.append(f"  소매 ${ici_retail:.2f}T | 기관 ${ici_inst:.2f}T")
          if bd_cur is not None:
              d = f"  WoW {bd_delta:+.0f}B" if bd_delta is not None else ""
              lines.append(f"• 은행예금: ${bd_cur/1000:.3f}T{d}")

          # 4W Δ 국면 판별 — ICI KV 5주 이상 필요 (프론트엔드 동일 로직)
          rrp_delta = rr.get("rrpDelta5d")
          fmt_gb = lambda v: f"{v:+.1f}B" if v is not None else "—"

          if ici_kv_cnt >= 5 and len(ici_hist) >= 5:
              mmf_4w_cur  = ici_hist[0].get("totalB")   # $B
              mmf_4w_prv4 = ici_hist[4].get("totalB")
              mmf_4w_delta = round(mmf_4w_cur - mmf_4w_prv4, 1) if mmf_4w_cur is not None and mmf_4w_prv4 is not None else None

              bd_series = bd.get("series", [])
              bd_4w_delta = None
              if len(bd_series) >= 5:
                  b0 = bd_series[0].get("value")
                  b4 = bd_series[4].get("value")
                  if b0 is not None and b4 is not None:
                      bd_4w_delta = round(b0 - b4, 1)

              if mmf_4w_delta is not None or bd_4w_delta is not None:
                  rrp_str = fmt_gb(rrp_delta) if rrp_delta is not None else "—"
                  lines.append(f"• 4W Δ — MMF: {fmt_gb(mmf_4w_delta)} | 은행예금: {fmt_gb(bd_4w_delta)} | RRP: {rrp_str}")

              # 5가지 국면 판별
              if mmf_4w_delta is not None and bd_4w_delta is not None and rrp_delta is not None:
                  if mmf_4w_delta > 0:
                      if bd_4w_delta < 0:
                          ratio = round(mmf_4w_delta / abs(bd_4w_delta), 2)
                          if ratio > 1.5:
                              lines.append(f"🔴 예금 이탈 심화 (비율 {ratio}x)")
                              lines.append("  MMF↑ & 은행예금↓ — SLOOS 긴축, 신용 경색 우려")
                          else:
                              lines.append(f"🟡 조용한 뱅크런 (비율 {ratio}x)")
                              lines.append("  은행→MMF 자금 직접 유출, 신용 수축 초기")
                      else:
                          lines.append("🟢 건강한 자금 대기")
                          lines.append("  예금↑ & MMF↑ — 시장 재진입 대기 자본 축적")
                  else:
                      if rrp_delta < 0:
                          lines.append("🟢 진짜 랠리 (Risk-On)")
                          lines.append("  MMF↓ & RRP↓ — 연준 배관 열림, 실질 유동성 팽창")
                      else:
                          lines.append("🟡 가짜 랠리 주의")
                          lines.append("  MMF↓ & RRP↑ — 배관 미개선, 기존 자금 재분배")
          else:
              lines.append(f"⏳ 자금이동 국면: 데이터 축적 중 ({ici_kv_cnt}/5주)")

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 4. 민간레포 유입 국면
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          regime      = rr.get("regime")
          rrp_cur     = rr.get("rrpCurrent")
          rrp_d5      = rr.get("rrpDelta5d")
          sofr_cur    = rr.get("sofrVolCurrent")
          sofr_d5     = rr.get("sofrVolDelta5d")

          REGIME_MAP = {
              "expansion":   ("🟢", "정상 유입 (Liquidity Expansion)", "RRP↓ & SOFR Vol↑ — 바톤터치 정상"),
              "divergence":  ("🟡", "분산 및 대기 (Divergence)", "RRP↓ & SOFR Vol↓ — T-Bill 매입 또는 관망"),
              "contraction": ("🔴", "유동성 파킹 (Contraction)", "RRP↑ — 연준 금고로 자금 재유입, 수축"),
          }

          lines += ["", "━━━ 민간레포 유입 국면 ━━━"]
          if regime and regime in REGIME_MAP:
              em, label, desc = REGIME_MAP[regime]
              lines.append(f"{em} {label}")
              if rrp_cur is not None:
                  d5 = f"  Δ5d {rrp_d5:+.1f}B" if rrp_d5 is not None else ""
                  lines.append(f"• RRP: ${rrp_cur:.1f}B{d5}")
              if sofr_cur is not None:
                  d5 = f"  Δ5d {sofr_d5:+.1f}B" if sofr_d5 is not None else ""
                  lines.append(f"• SOFR Vol: ${sofr_cur/1000:.2f}T{d5}")
              lines.append(f"  {desc}")
          else:
              lines.append("⏳ 데이터 대기 중")

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 5. 종합 판단
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          lines += ["", "━━━ 종합 ━━━"]
          if nl_d is not None:
              nl_dB = nl_d / 1e3
              if   nl_dB >  50: lines.append("→ 유동성 순증 — 위험자산 우호 환경 🟢")
              elif nl_dB < -50: lines.append("→ 유동성 순감 — 단기 헤드윈드 주의 🔴")
              else:             lines.append("→ 유동성 소폭 변화 — 방향성 중립 ⚪")

          # 드레인 경고
          danger_weeks = [w["label"] for w in weeks if w.get("isDangerZone")]
          if danger_weeks:
              lines.append(f"→ {', '.join(danger_weeks)} 드레인 집중, 경매 금리 주시")

          lines += ["", "🔗 macromonitor.zbbg.kr"]

          text = "\n".join(lines)
          print("메시지 미리보기:")
          print(text)

          # ── Telegram 발송 ──
          url     = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
          payload = json.dumps({
              "chat_id": CHAT_ID,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
          }).encode("utf-8")
          import urllib.request
          req = urllib.request.Request(url, data=payload,
                                       headers={"Content-Type": "application/json"})
          with urllib.request.urlopen(req, timeout=15) as resp:
              result = json.loads(resp.read())
              if result.get("ok"):
                  print("✅ H.4.1 Telegram 발송 완료")
              else:
                  print(f"❌ Telegram 오류: {result}")
                  exit(1)
          PYEOF
