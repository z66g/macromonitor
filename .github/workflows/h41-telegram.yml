name: H.4.1 Weekly Liquidity Telegram

on:
  schedule:
    # 매주 목요일 22:00 UTC (금요일 07:00 KST) — Fed H.4.1 릴리즈(~21:30 UTC) 직후
    - cron: '0 22 * * 4'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch H.4.1 data & Send Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKER_URL: https://macrolens-worker.macrolens.workers.dev
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, datetime

          BOT_TOKEN  = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          CHAT_ID    = os.environ.get("TELEGRAM_CHAT_ID", "")
          WORKER_URL = os.environ.get("WORKER_URL", "")

          if not BOT_TOKEN or not CHAT_ID:
              print("Telegram secrets 없음, 스킵")
              exit(0)

          # ── Worker에서 H.4.1 데이터 가져오기 ──
          print("H.4.1 데이터 요청 중...")
          try:
              req = urllib.request.Request(
                  f"{WORKER_URL}/h41-html",
                  headers={"User-Agent": "MacroMonitor-Actions/1.0"}
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  raw = json.loads(resp.read())
          except Exception as e:
              print(f"Worker 호출 실패: {e}")
              exit(1)

          # ── 응답 구조: raw["data"][key]["valueB"] 단위: 십억달러(B)
          #              raw["data"][key]["deltaB"] 전주 대비 Δ 십억달러
          data    = raw.get("data", {})

          def get_B(key):
              item = data.get(key, {})
              return item.get("valueB"), item.get("deltaB")

          def fmt_T(v):
              return f"${v/1e3:.2f}T" if v is not None else "N/A"

          def fmt_B(v):
              return f"${v:.0f}B" if v is not None else "N/A"

          def delta_str(d):
              if d is None: return ""
              sign  = "+" if d >= 0 else ""
              emoji = "🟢" if d >= 0 else "🔴"
              if abs(d) >= 100:
                  return f"  Δ {sign}{d/1e3:.2f}T {emoji}"
              return f"  Δ {sign}{d:.1f}B {emoji}"

          res_B,  res_dB  = get_B("reserve_balances")
          rrp_B,  rrp_dB  = get_B("rrp_bs")
          tga_B,  tga_dB  = get_B("tga")
          cur_B,  cur_dB  = get_B("currency_circ")

          net_B  = (res_B  + rrp_B)  if res_B  is not None and rrp_B  is not None else None
          net_dB = (res_dB + rrp_dB) if res_dB is not None and rrp_dB is not None else None

          release_date = raw.get("releaseDate", datetime.date.today().isoformat())

          if net_dB is not None:
              if   net_dB >  50: direction = "→ 유동성 순증 — 위험자산 우호 환경 🟢"
              elif net_dB < -50: direction = "→ 유동성 순감 — 단기 헤드윈드 주의 🔴"
              else:              direction = "→ 유동성 소폭 변화 — 방향성 중립 ⚪"
          else:
              direction = None

          lines = [
              f"📊 <b>Fed H.4.1 주간 유동성</b> | {release_date}",
              "─" * 24,
              f"• 준비금:    {fmt_T(res_B)}{delta_str(res_dB)}",
              f"• ON RRP:   {fmt_B(rrp_B)}{delta_str(rrp_dB)}",
              f"• TGA:      {fmt_B(tga_B)}{delta_str(tga_dB)}",
              f"• 유통화폐: {fmt_T(cur_B)}{delta_str(cur_dB)}",
              f"• 순유동성: {fmt_T(net_B)}{delta_str(net_dB)}",
              "",
          ]
          if direction:
              lines += [direction, ""]
          lines.append("🔗 macromonitor.zbbg.kr")

          text = "\n".join(lines)
          print("메시지 미리보기:")
          print(text)

          url     = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
          payload = json.dumps({
              "chat_id": CHAT_ID,
              "text": text,
              "parse_mode": "HTML",
              "disable_web_page_preview": True,
          }).encode("utf-8")
          req = urllib.request.Request(url, data=payload,
                                       headers={"Content-Type": "application/json"})
          with urllib.request.urlopen(req, timeout=15) as resp:
              result = json.loads(resp.read())
              if result.get("ok"):
                  print("✅ H.4.1 Telegram 발송 완료")
              else:
                  print(f"❌ Telegram 오류: {result}")
                  exit(1)
          PYEOF
