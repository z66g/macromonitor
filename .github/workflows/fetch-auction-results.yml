name: Fetch Auction Results

on:
  schedule:
    - cron: '0 16,17,18 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch + Analyze
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "" | base64 -d > /tmp/fetch.py
          python3 /tmp/fetch.py
      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/auction_results.json
          git diff --staged --quiet || git commit -m "chore: update auction results [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
