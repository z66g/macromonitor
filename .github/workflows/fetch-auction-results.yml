name: Fetch Auction Results

on:
  schedule:
    - cron: '0 16,17,18 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch + Analyze
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "" | base64 -d > /tmp/fetch.py
          python3 /tmp/fetch.py

      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/auction_results.json
          git diff --staged --quiet || git commit -m "chore: update auction results [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      # ── Telegram 알림: 오늘 경매 결과가 summary 완성된 경우에만 발송 ──
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYEOF'
          import json, os, datetime, urllib.request, urllib.parse

          BOT_TOKEN = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          CHAT_ID   = os.environ.get("TELEGRAM_CHAT_ID", "")
          today     = datetime.date.today().isoformat()

          if not BOT_TOKEN or not CHAT_ID:
              print("Telegram secrets 없음, 스킵")
              exit(0)

          with open("data/auction_results.json", encoding="utf-8") as f:
              data = json.load(f)

          # 오늘 날짜 + summary 완성 건만 추출
          today_done = [
              r for r in data.get("results", [])
              if r.get("auction_date", "")[:10] == today
              and r.get("summary")
          ]

          if not today_done:
              print(f"오늘({today}) 완성된 경매 결과 없음, 스킵")
              exit(0)

          def grade_emoji(g):
              return {"strong": "✅", "average": "🟡", "weak": "⚠️", "disastrous": "🚨"}.get(g or "", "⚪")

          def overall_emoji(summary_text):
              t = (summary_text or "").lower()
              if "strong"      in t: return "💪"
              if "average"     in t: return "😐"
              if "weak"        in t: return "⚠️"
              if "disastrous"  in t: return "🚨"
              return "📊"

          def fmt(v, dec=2):
              return str(round(v, dec)) if v is not None else "N/A"

          messages = []
          for r in today_done:
              an   = r.get("_analysis", {})
              gr   = an.get("grade", {})
              term = r.get("security_term", "")
              stype= r.get("security_type", "")
              size = (r.get("offering_amt") or 0) / 1e9

              # 요약 첫 줄 (총평 줄)
              summary_lines = (r.get("summary") or "").strip().splitlines()
              first_line = summary_lines[0] if summary_lines else ""

              tail_bps = an.get("tail_bps")
              tail_str = (f"{tail_bps:+.1f}bp" if tail_bps is not None else "N/A")
              tail_emoji = grade_emoji(gr.get("tail"))

              btc     = an.get("btc")
              btc_avg = an.get("btc_avg6")
              btc_str = f"{fmt(btc, 2)}x" if btc is not None else "N/A"
              btc_avg_str = f"{fmt(btc_avg, 2)}x" if btc_avg is not None else "N/A"

              in_pct  = an.get("in_pct")
              in_avg  = an.get("in_avg6")
              pd_pct  = an.get("pd_pct")
              pd_avg  = an.get("pd_avg6")

              # 나머지 요약 (2~4줄)
              detail_lines = "\n".join(summary_lines[1:]) if len(summary_lines) > 1 else ""

              msg = (
                  f"🏦 <b>국채경매 결과</b> | {term} {stype} | {today}\n\n"
                  f"{overall_emoji(r.get('summary'))} {first_line}\n\n"
                  f"• Tail: {tail_str} {tail_emoji}\n"
                  f"• BTC: {btc_str}  (6avg {btc_avg_str}) {grade_emoji(gr.get('btc'))}\n"
                  f"• Indirect: {fmt(in_pct, 1)}%  (6avg {fmt(in_avg, 1)}%)\n"
                  f"• PD: {fmt(pd_pct, 1)}%  (6avg {fmt(pd_avg, 1)}%) {grade_emoji(gr.get('pd'))}\n"
                  f"• 규모: ${fmt(size, 1)}B\n"
              )
              if detail_lines:
                  msg += f"\n{detail_lines}\n"
              msg += f"\n🔗 macromonitor.zbbg.kr"
              messages.append(msg)

          # 발송
          url = f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage"
          for text in messages:
              payload = json.dumps({
                  "chat_id": CHAT_ID,
                  "text": text,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": True,
              }).encode("utf-8")
              req = urllib.request.Request(url, data=payload,
                                           headers={"Content-Type": "application/json"})
              with urllib.request.urlopen(req, timeout=15) as resp:
                  result = json.loads(resp.read())
                  if result.get("ok"):
                      print(f"✅ Telegram 발송 완료: {r.get('security_term')}")
                  else:
                      print(f"❌ Telegram 오류: {result}")
          PYEOF
