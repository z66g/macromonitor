name: Fetch DTS TGA Daily

on:
  # cron-job.org에서 repository_dispatch로 트리거 (매일 KST 08:00 = UTC 23:00)
  repository_dispatch:
    types: [fetch-dts]
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch DTS TGA + Write KV
        env:
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_ID:       "66c313c710a04a4eb04775b80a44f313"
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import os, json, requests, datetime

          CF_TOKEN    = os.environ["CLOUDFLARE_API_TOKEN"]
          CF_ACCOUNT  = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          NAMESPACE   = os.environ["KV_NAMESPACE_ID"]

          KV_BASE = f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT}/storage/kv/namespaces/{NAMESPACE}"
          HDR     = {"Authorization": f"Bearer {CF_TOKEN}"}

          def kv_put(key, value, ttl=None):
              url = f"{KV_BASE}/values/{key}"
              params = {"expiration_ttl": ttl} if ttl else {}
              body = value if isinstance(value, str) else json.dumps(value)
              r = requests.put(url, headers=HDR, params=params,
                               data=body.encode("utf-8"), timeout=30)
              r.raise_for_status()

          # ── DTS API: TGA Closing Balance (일별) ──
          # fiscal_service 경로 + operating_cash_balance 테이블
          # account_type "Treasury General Account (TGA) Closing Balance" 필터
          # 값은 open_today_bal 컬럼에 $M 단위로 제공 (API 구조 특성)
          DTS_URL = (
              "https://api.fiscaldata.treasury.gov/services/api/fiscal_service"
              "/v1/accounting/dts/operating_cash_balance"
              "?fields=record_date,account_type,open_today_bal"
              "&filter=account_type:eq:Treasury%20General%20Account%20(TGA)%20Closing%20Balance"
              "&sort=-record_date"
              "&page%5Bsize%5D=60"
          )

          r = requests.get(DTS_URL, headers={"Accept": "application/json"}, timeout=30)
          r.raise_for_status()
          rows = r.json().get("data", [])

          if not rows:
              print("TGA Closing Balance 데이터 없음")
              exit(1)

          # Millions → Billions 변환
          series = []
          for row in rows:
              try:
                  val_m = float(str(row["open_today_bal"]).replace(",", ""))
                  series.append({
                      "date":  row["record_date"],
                      "close": round(val_m / 1000, 1),  # $B
                  })
              except (ValueError, KeyError):
                  continue

          # 오름차순 정렬 (차트용)
          series.sort(key=lambda x: x["date"])

          payload = {
              "latest":    series[-1] if series else None,
              "series":    series,
              "count":     len(series),
              "fetchedAt": datetime.datetime.now(datetime.timezone.utc).isoformat(),
          }

          kv_put("tga_dts_v1", payload, ttl=86400)  # 24h TTL
          latest = series[-1] if series else {}
          print(f"DTS TGA 저장 완료: {len(series)}일치, 최신: {latest.get('date')} ${latest.get('close')}B")
          PYEOF
