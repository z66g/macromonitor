name: Generate News Digest

on:
  repository_dispatch:
    types: [generate-news-digest]
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate digest via Gemini + Write KV
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAMESPACE_ID:       "66c313c710a04a4eb04775b80a44f313"
        run: |
          pip install requests -q
          python3 << 'PYEOF'
          import os, json, re, datetime, requests
          from email.utils import parsedate_to_datetime

          GEMINI_KEY  = os.environ["GEMINI_API_KEY"]
          CF_TOKEN    = os.environ["CLOUDFLARE_API_TOKEN"]
          CF_ACCOUNT  = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          NAMESPACE   = os.environ["KV_NAMESPACE_ID"]

          KV_BASE = f"https://api.cloudflare.com/client/v4/accounts/{CF_ACCOUNT}/storage/kv/namespaces/{NAMESPACE}"
          HDR     = {"Authorization": f"Bearer {CF_TOKEN}"}

          def kv_get(key):
              r = requests.get(f"{KV_BASE}/values/{key}", headers=HDR, timeout=20)
              if r.status_code == 404: return None
              r.raise_for_status()
              try: return r.json()
              except: return r.text

          def kv_put(key, value, ttl=None):
              url = f"{KV_BASE}/values/{key}"
              params = {"expiration_ttl": ttl} if ttl else {}
              body = value if isinstance(value, str) else json.dumps(value)
              r = requests.put(url, headers=HDR, params=params,
                               data=body.encode("utf-8"), timeout=30)
              r.raise_for_status()

          news = kv_get("news_cache_v1")
          if not news or not news.get("items"):
              print("뉴스 캐시 없음, 종료")
              exit(0)

          # 최근 12시간 뉴스 (번역본 우선)
          now_ts = datetime.datetime.now(datetime.timezone.utc).timestamp()

          def parse_date(s):
              if not s: return 0
              # 1) ISO 8601 (YYYY-MM-DDTHH:MM:SSZ or +00:00)
              try:
                  return datetime.datetime.fromisoformat(s.replace("Z","+00:00")).timestamp()
              except: pass
              # 2) RFC 822 / RFC 2822 (Wed, 15 Apr 2026 14:30:00 GMT)
              try:
                  return parsedate_to_datetime(s).timestamp()
              except: pass
              return 0

          items_raw = news["items"]
          recent = []
          for n in items_raw:
              ts = parse_date(n.get("pubDate") or "")
              if ts and now_ts - ts < 12 * 3600:
                  recent.append(n)

          print(f"전체 {len(items_raw)}건 중 최근 12h: {len(recent)}건")
          recent = recent[:25]

          if not recent:
              print("최근 12h 뉴스 없음, 종료")
              exit(0)

          items_text = "\n".join(
              f"[{i+1}] {(n.get('titleKo') or n.get('title',''))} ({n.get('sourceId','')})"
              for i, n in enumerate(recent)
          )

          prompt = f"""당신은 MacroMonitor의 거시경제 뉴스 편집 엔진입니다.

          ■ 선별 우선순위 (높을수록 우선)
          1. Fed 커뮤니케이션 (FOMC, 파월·이사 발언, 통화정책 시그널)
          2. 재정·국채 (TGA, 부채한도, QRA, 국채 경매 결과)
          3. 신용 이벤트 (은행 부실, 기업 디폴트, 스프레드 급변)
          4. 지정학 (유가·안전자산 직접 영향 있는 것만)
          5. 매크로 서프라이즈 (CPI/NFP 예상 대비 큰 이탈)
          6. AI·기술 섹터 성장 기대감 (시장 영향 있는 것)

          ■ 제외 대상
          - 정치·사회·연예·스포츠
          - 개별 기업 실적 (시장 전반 영향 없는 것)
          - 반복·중복 뉴스

          ■ 출력 규칙
          - 반드시 JSON만 반환 (코드블록 없이)
          - 한국어 한 줄 요약: 명사구 종결, 수치 포함 권장
          - 선별 불가 시 빈 배열 반환

          다음 {len(recent)}건의 뉴스에서 시장 배관(유동성·금리·신용·지정학)에 가장 큰 파급력이 있는 3건을 선별하고 한 줄로 요약하세요.

          {items_text}

          출력 JSON:
          {{"items":[{{"rank":1,"title":"원문 제목","summary":"한 줄 요약"}},{{"rank":2,...}},{{"rank":3,...}}]}}"""

          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key={GEMINI_KEY}"
          body = {
              "contents": [{"parts": [{"text": prompt}]}],
              "generationConfig": {
                  "temperature": 0,
                  "maxOutputTokens": 2048,
                  "responseMimeType": "application/json",
                  "thinkingConfig": {"thinkingBudget": 0},
              },
          }
          r = requests.post(url, json=body, timeout=60)
          r.raise_for_status()
          data = r.json()
          raw  = "".join(p.get("text","") for p in data.get("candidates",[{}])[0].get("content",{}).get("parts",[]))
          cleaned = re.sub(r'^```json\s*|\s*```$', '', raw.strip(), flags=re.M)
          parsed  = json.loads(cleaned)

          digest = {
              "items":       parsed.get("items", []),
              "generatedAt": datetime.datetime.now(datetime.timezone.utc).isoformat(),
          }
          kv_put("news_digest_v1", digest, ttl=86400)
          print(f"다이제스트 생성: {len(digest['items'])}건")

          # 누적 히스토리 (배치 텔레그램 발송용)
          hist = kv_get("news_digest_history_v1") or {"digests": []}
          if not isinstance(hist, dict): hist = {"digests": []}
          hist_digests = hist.get("digests", [])
          hist_digests.append({
              "generatedAt": digest["generatedAt"],
              "items": digest["items"],
          })
          hist["digests"] = hist_digests[-10:]   # 최대 10회분 보관
          kv_put("news_digest_history_v1", hist, ttl=86400 * 2)
          print(f"히스토리 누적: {len(hist['digests'])}개")
          PYEOF
