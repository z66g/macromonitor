name: Test Auction Tail (1회용)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gemini tail test
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "" | base64 -d > /tmp/test_tail.py
          python3 /tmp/test_tail.py
